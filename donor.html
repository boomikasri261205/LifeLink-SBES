<section class="donor-section">

<div class="donor-card">

<h1><i class="fa-solid fa-heart-circle-plus"></i> Become a Blood Donor</h1>

<p>
Join our donor network and help save lives during emergencies.
</p>

<form id="donorForm">

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" id="donorName" placeholder="Full Name" required>
</div>

<div class="input-box">
<i class="fa-solid fa-calendar"></i>
<input type="number" id="donorAge" placeholder="Age" required>
</div>

<div class="input-box">
<i class="fa-solid fa-droplet"></i>

<select id="donorBloodGroup" required>

<option>Select Blood Group</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

</div>

<div class="input-box">
<i class="fa-solid fa-weight-scale"></i>
<input type="number" id="donorWeight" placeholder="Weight (kg)" required>
</div>

<div class="input-box">
<i class="fa-solid fa-phone"></i>
<input type="tel" id="donorMobile" placeholder="Mobile Number" required>
</div>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" id="donorEmail" placeholder="Email Address">
</div>

<div class="input-box">
<i class="fa-solid fa-location-dot"></i>
<input type="text"id="donorCity" placeholder="City"required>
</div>

<div class="input-box">
<i class="fa-solid fa-calendar-check"></i>
<input type="date"id="lastDonation">
</div>

<button class="register-btn">

<i class="fa-solid fa-hand-holding-heart"></i>

Register as Donor

</button>

</form>

<div class="next-btn">

<button onclick="window.location.href='hospital.html'">

Next →

</button>

</div>

</div>

</section>

<footer>

</body>
</html>
